body:
  text: 雜禮議或問以異姓為後然當還服本親及其子當又從其父而服耶將以異姓而不服也答曰神不歆非族明非異姓所應祭也頃世人無後並取異姓以自繼然本親之服骨血之恩無絶道也異姓之義可同於女子出適還服本親皆降一等至於其子應從服者亦當同於女子之子從於母而服其外親今出為異姓作後其子亦當從於父母服之也父為所生父母周子宜如外祖父母之加也其昆弟之子父雖服之大功於子尤無尊可加及其姊妹為父小功則子皆宜從於異姓之服不得過緦麻也杜佑通典卷六十九劉寶以為孫為祖不三年喪服云孫為祖周按小記為祖後者為祖母三年二文不同何以為正答曰經無孫為祖三年之文小記所云為祖母三年自謂無後養父子以為孫者耳喪服云為人後者三年為人後者或為子或為孫故經但稱為人後不列所後者名所以通人無貴賤為人後者用此禮也若荀太尉無子養兄孫以為孫是小記所謂為祖後者也夫人情不殊祖所養孫猶子而孫奉祖猶父故聖人稱情以定制為人後者無復父祖之差同三年也喪服傳父卒然後為祖後斬此謂嫡孫為祖喪主當服斬不解傳意小記與傳但解經意耳傳者稱此祖後謂父之長子祖之鏑孫也已上厭於父父亡然後乃下為長子斬非孫上為祖斬也王敞難劉寶曰喪服小記祖父卒為祖母後者三年此謂孫為祖後者喪服父亡為母三年言為祖母三年祖父三年可知也為人後者以當收族而嚴宗廟也必以同宗支子擇其昭穆之倫而立之不得高祖無子而立元孫之序嚴宗廟者亦可以在繼養使鬼神有所享也按士二廟若立玄孫則所嚴之祖不及曾高而祖禰無鬼將何所饗乎荀太尉秩尊其統宜遠親廟有四孫之所得祭高祖也則於太尉為祖子所得祭高祖也今玄孫但得祭祖而使曾祖不食是則先人將恐於為厲故知非立後之道也又臣從君服每降一等喪服為君之祖服用制君服三年明之也若如論意謂小記所言是為長子服者又當言父卒然後為子三年不得言祖父卒而為祖母後者三年又養人子為己孫與己自有孫豈異哉國子博士吳商答劉寶議曰按禮貴嫡重正所尊祖禰繼代之正統也夫受重者不得以輕服服之是以孫及曾元其為後者皆服三年受重故也且絶屬之宗來為人後者服之如今嫡孫為後為祖服周與衆孫無異既非受重之義豈合聖人稱情之制耶且孫為祖正服周祖為孫正服九月嫡孫為後則祖為加服亦當加三年此經之明據也今欲使祖以嫡加孫孫以庶服報祖豈經意耶又欲使絶屬之孫同於嫡孫豈合人情通典卷八十八成洽論云嫡孫傳重不服斬也夫服以三年為至重故以至尊至親者處之自此以往上下降殺一等經之例也服父三年服祖宜周而傳云父卒為祖後者服斬為嫡孫者依此為制若其必然越於常例後祖服異禮之重事宜見斬縗之經不應闕而不記也且子為父三年父為長子亦三年若嫡孫為祖如子則祖為嫡孫亦當如父為長子不得為之周也吳商曰凡人為後者當如父今孫為祖後而欲使為祖周與衆孫無異豈是為後之義乎且祖為孫正服九月今嫡孫為後祖加之周孫亦加祖三年經之明義也今使祖加孫服而孫不加祖服豈經義哉且經云臣為君祖父母服周從服例降一等則君為祖服斬矣此非經意耶何責闕而不記也又云孫為祖如子為父則祖為孫亦當如父為長子者且孫為後加一等服三年祖亦加孫一等服周如論之意欲使祖加孫二等而孫加祖一等此豈經例而云傳不通乎同上成洽難喪服傳曰出妻之子為父後者為出母無服與尊者為體不敢服其私親也經為繼父服者亦父後者也為父後服繼父服則自服其母可知也出母之與嫁母俱絶族今為嫁母服不為出母服其不然乎經證若斯其謬耳吳商答曰出母無服此由尊父之命嫁母父不命出何得同出母乎為繼父服者為其父沒年幼隨母再適己無大功之親與繼父同財共居為築宮廟四時祭祀其元此恩由繼父所以為服耳且妾之無子妾子之無母父命為母子則生事之如母喪則服之三年貴父命也而今欲以出母同於嫁母違廢父命豈人子所行又引繼父云經謬也又出母之黨無服嫁母之黨自應服之豈可復同乎通典卷九十四後漢劉表及侍中成粲云父母亡在祖後則不為祖母三年吳商駮之曰嘗見表所作喪服後定變除為婦人之服不踰男子孫為祖父服周父亡之後為祖母服而云不得踰祖也又見成侍中以為己自受重於祖祖母服不應三年商按假使子為人後為本父服周而所後者更自有子己則還家而母後亡當可以不得踰父不三年乎又從祖祖父先亡己為小功五月而已後為從父後從父又先亡祖母後卒可使以己先為祖父小功今為祖母不踰祖父復服五月乎諸如此比妃服重於夫甚衆不可具記不得踰夫之説經傳無據嫡行庶服義又不通粲又云己自受重於父不受重於祖今服祖母亦當周又𪗋縗章臣為君之父母祖父母周凡臣從君所服而降一等臣從服周則君為三年也據為國君而有父若祖之喪者謂始封君也其繼體則父與祖並有廢疾不立者也有廢疾不立則君受國於曾祖不受國於祖也不受國於祖猶服三年此則經之明例非從傳記之説也其義如此則凡為後者皆應三年何必受重然後服斬通典卷九十七合閏以正通典卷一百王儉議引吳商按左氏春秋經魯襄公二十八年十二月甲寅天王崩乙未楚子卒其間相去四十二日是則乙未閏月之日也經不書閏月而書十二月明閏非正宜附正之文其不曰二十九年正月是附前月之證又禮記曰喪事先遠日則祥除在閏月同上
